<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trạm Điều Khiển PID F450 (Bản BLE 4.0 - Chống Ngắt Kết Nối)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #e9ecef; color: #2c3e50; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header-panel { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); width: 100%; max-width: 900px; text-align: center; margin-bottom: 20px; }
        h2 { margin-top: 0; margin-bottom: 15px; color: #34495e; font-size: 24px;}
        
        .btn-connect { background-color: #8e44ad; color: white; border: none; padding: 12px 25px; font-size: 16px; border-radius: 8px; cursor: pointer; transition: 0.3s; font-weight: bold; width: 100%; max-width: 350px;}
        .btn-connect:hover { background-color: #9b59b6; }
        #status { display: block; margin-top: 10px; font-size: 14px; color: #7f8c8d; font-weight: bold; }

        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; width: 100%; max-width: 900px; }
        
        .pid-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-top: 5px solid; }
        .card-roll { border-top-color: #e74c3c; } 
        .card-pitch { border-top-color: #2ecc71; } 
        .card-yaw { border-top-color: #f1c40f; } 
        
        .pid-card h3 { margin-top: 0; text-align: center; color: #2c3e50; border-bottom: 2px solid #ecf0f1; padding-bottom: 10px; }

        .input-group { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        .input-group label { font-weight: bold; width: 35px; color: #34495e; }
        .input-group input { flex: 1; padding: 8px; margin: 0 10px; font-size: 15px; border: 1px solid #bdc3c7; border-radius: 5px; outline: none; }
        .input-group input:focus { border-color: #3498db; }
        .btn-send-val { background-color: #95a5a6; color: white; border: none; padding: 8px 15px; font-size: 14px; font-weight: bold; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .btn-send-val:hover { background-color: #7f8c8d; }

        .control-panel { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); width: 100%; max-width: 900px; display: flex; justify-content: center; gap: 20px; margin-top: 20px; box-sizing: border-box;}
        .btn-action { color: white; border: none; padding: 15px 40px; font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.3s; flex: 1; max-width: 300px;}
        .btn-arm { background-color: #e74c3c; }
        .btn-arm:hover { background-color: #c0392b; box-shadow: 0 0 10px rgba(231, 76, 60, 0.5); }
        .btn-disarm { background-color: #34495e; }
        .btn-disarm:hover { background-color: #2c3e50; }
    </style>
</head>
<body>

<div class="header-panel">
    <h2>Trạm Điều Khiển PID F450 (BLE 4.0)</h2>
    <button id="connectBtn" class="btn-connect">⚡ KẾT NỐI BLUETOOTH LE</button>
    <span id="status">Trạng thái: Chưa kết nối</span>
</div>

<div class="grid-container">
    <div class="pid-card card-roll">
        <h3>🔴 TRỤC ROLL (Trục X)</h3>
        <div class="input-group"><label>Kp</label><input type="number" id="rP" step="0.01"><button id="btn_rP" class="btn-send-val">Gửi</button></div>
        <div class="input-group"><label>Ki</label><input type="number" id="rI" step="0.01"><button id="btn_rI" class="btn-send-val">Gửi</button></div>
        <div class="input-group"><label>Kd</label><input type="number" id="rD" step="0.01"><button id="btn_rD" class="btn-send-val">Gửi</button></div>
    </div>
    <div class="pid-card card-pitch">
        <h3>🟢 TRỤC PITCH (Trục Y)</h3>
        <div class="input-group"><label>Kp</label><input type="number" id="pP" step="0.01"><button id="btn_pP" class="btn-send-val">Gửi</button></div>
        <div class="input-group"><label>Ki</label><input type="number" id="pI" step="0.01"><button id="btn_pI" class="btn-send-val">Gửi</button></div>
        <div class="input-group"><label>Kd</label><input type="number" id="pD" step="0.01"><button id="btn_pD" class="btn-send-val">Gửi</button></div>
    </div>
    <div class="pid-card card-yaw">
        <h3>🟡 TRỤC YAW (Trục Z)</h3>
        <div class="input-group"><label>Kp</label><input type="number" id="yP" step="0.01"><button id="btn_yP" class="btn-send-val">Gửi</button></div>
        <div class="input-group"><label>Ki</label><input type="number" id="yI" step="0.01"><button id="btn_yI" class="btn-send-val">Gửi</button></div>
        <div class="input-group"><label>Kd</label><input type="number" id="yD" step="0.01"><button id="btn_yD" class="btn-send-val">Gửi</button></div>
    </div>
</div>

<div class="control-panel">
    <button id="armBtn" class="btn-action btn-arm">🔥 BẬT</button>
    <button id="disarmBtn" class="btn-action btn-disarm">🛑 TẮT</button>
</div>

<script>
    let bleDevice;
    let bleCharacteristic;
    let heartbeatInterval; // Biến lưu trữ vòng lặp nhịp tim

    const UART_SERVICE_UUID = 0xFFE0;
    const UART_CHAR_UUID = 0xFFE1;

    // --- HÀM XỬ LÝ KHI BỊ RỚT MẠNG ---
    function onDisconnected(event) {
        console.log('Đã mất kết nối BLE!');
        document.getElementById('status').innerText = "❌ ĐÃ MẤT KẾT NỐI BLE!";
        document.getElementById('status').style.color = "#e74c3c";
        document.getElementById('connectBtn').innerText = "⚡ KẾT NỐI LẠI";
        document.getElementById('connectBtn').style.backgroundColor = "#8e44ad";
        
        // Dừng việc gửi nhịp tim lại để tránh lỗi báo đỏ Console
        if (heartbeatInterval) {
            clearInterval(heartbeatInterval);
        }
    }

    // --- HÀM TẠO NHỊP TIM GIỮ KẾT NỐI ---
    function startHeartbeat() {
        heartbeatInterval = setInterval(() => {
            if (bleCharacteristic) {
                // Gửi một dấu cách ngầm (" \n") mỗi 2 giây
                // Dấu cách này sẽ bị code STM32 của bạn phớt lờ hoàn toàn, nhưng giúp Bluetooth luôn thức
                const encoder = new TextEncoder();
                bleCharacteristic.writeValue(encoder.encode(" \n"))
                    .catch(err => console.log("Lỗi Heartbeat:", err));
            }
        }, 500); 
    }

    document.getElementById('connectBtn').addEventListener('click', async () => {
        try {
            document.getElementById('status').innerText = "Đang tìm thiết bị...";
            document.getElementById('status').style.color = "#7f8c8d";
            
            // 1. Quét tìm thiết bị BLE
            bleDevice = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: [UART_SERVICE_UUID]
            });

            // Gắn sự kiện lắng nghe đứt kết nối
            bleDevice.addEventListener('gattserverdisconnected', onDisconnected);

            // 2. Kết nối tới Server GATT của thiết bị
            document.getElementById('status').innerText = "Đang kết nối vào " + bleDevice.name + "...";
            const server = await bleDevice.gatt.connect();

            // 3. Xin quyền truy cập dịch vụ gửi nhận dữ liệu
            const service = await server.getPrimaryService(UART_SERVICE_UUID);
            bleCharacteristic = await service.getCharacteristic(UART_CHAR_UUID);

            // 4. Báo kết nối thành công & Kích hoạt nhịp tim
            document.getElementById('status').innerText = "Trạng thái: ĐÃ KẾT NỐI BLE ✅";
            document.getElementById('status').style.color = "#27ae60";
            document.getElementById('connectBtn').innerText = "Đã kết nối " + bleDevice.name;
            document.getElementById('connectBtn').style.backgroundColor = "#27ae60";

            startHeartbeat(); // Bắt đầu bơm máu giữ kết nối!

        } catch (error) {
            console.log(error);
            document.getElementById('status').innerText = "Lỗi: " + error.message;
            document.getElementById('status').style.color = "#e74c3c";
        }
    });

    // --- HÀM GỬI DỮ LIỆU CHÍNH ---
    async function sendData(dataString) {
        if (bleCharacteristic) {
            const encoder = new TextEncoder();
            const data = encoder.encode(dataString + "\n");
            try {
                await bleCharacteristic.writeValue(data);
                console.log("Đã gửi:", dataString);
            } catch (err) {
                console.log("Lỗi gửi:", err);
            }
        } else {
            alert("Vui lòng kết nối BLE trước!");
        }
    }

    // --- GẮN SỰ KIỆN CHO TỪNG Ô NHẬP ---
    function setupInput(inputId, btnId, prefix) {
        const inputField = document.getElementById(inputId);
        const btn = document.getElementById(btnId);
        
        btn.addEventListener('click', () => {
            if(inputField.value !== "") {
                sendData(prefix + inputField.value); 
                btn.style.backgroundColor = "#27ae60";
                setTimeout(() => btn.style.backgroundColor = "#95a5a6", 300);
            }
        });
        
        inputField.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                btn.click();
            }
        });
    }

    setupInput('rP', 'btn_rP', '1P'); setupInput('rI', 'btn_rI', '1I'); setupInput('rD', 'btn_rD', '1D');
    setupInput('pP', 'btn_pP', '2P'); setupInput('pI', 'btn_pI', '2I'); setupInput('pD', 'btn_pD', '2D');
    setupInput('yP', 'btn_yP', '3P'); setupInput('yI', 'btn_yI', '3I'); setupInput('yD', 'btn_yD', '3D');

    document.getElementById('armBtn').addEventListener('click', () => sendData("A"));
    document.getElementById('disarmBtn').addEventListener('click', () => sendData("D"));
</script>
</body>
</html>
